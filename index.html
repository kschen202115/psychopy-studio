<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体验版服务结束公告 - Psyexp Online</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            padding: 40px 32px;
            text-align: center;
        }

        .icon-container {
            width: 64px;
            height: 64px;
            background-color: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
            color: var(--primary-color);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 15px;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 24px;
        }

        .content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-muted);
            text-align: left;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            margin-bottom: 28px;
        }

        .content p {
            margin-bottom: 12px;
        }

        .content p:last-child {
            margin-bottom: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.15s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.15);
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .countdown {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .countdown span {
            font-weight: 600;
            color: var(--primary-color);
        }

        .footer {
            margin-top: 48px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-container">
        <!-- 页面顶部的指向箭头/转接 SVG 图标 -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
        </svg>
    </div>

    <h1>体验版已结束公告</h1>
    <div class="subtitle">正式版已登陆 Psyexp Online</div>

    <div class="content">
        <p>感谢您一直以来对我们体验版/测试版的关注与支持。目前，该阶段的体验和测试工作已顺利结束，体验版服务现已停止接收新数据并正式下线。</p>
        <p>为了给您提供更加稳定、安全的服务体验，我们已完成服务的全新升级。<strong>正式版本已正式在 Psyexp Online 平台上线运作。</strong></p>
    </div>
    
    <a href="https://www.psyexp.online" class="btn">前往 Psyexp Online</a>

    <div class="countdown" id="countdown-container">
        系统将在 <span id="seconds">5</span> 秒后自动跳转至官方平台...
    </div>

    <div class="footer">
        © 2026 Psyexp Online. All rights reserved.
    </div>
</div>

<script>
    let secondsLeft = 5;
    const secondsSpan = document.getElementById('seconds');
    const targetUrl = 'https://www.psyexp.online'; // Psyexp Online 官方链接

    const countdownInterval = setInterval(() => {
        secondsLeft--;
        if (secondsSpan) {
            secondsSpan.textContent = secondsLeft;
        }
        
        if (secondsLeft <= 0) {
            clearInterval(countdownInterval);
            window.location.href = targetUrl;
        }
    }, 1000);
</script>

</body>
</html>
