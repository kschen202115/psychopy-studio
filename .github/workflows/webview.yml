name: Deploy PsychoPy Studio Web to GitHub Pages
on:
  push:
    branches: 
    - release
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # checkout this repo
      - name: Checkout
        uses: actions/checkout@v4
      # install Node
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      # install dependencies
      - name: Install dependencies
        run: npm i
      # build static site
      - name: build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: |
          npm run svelte:build
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4