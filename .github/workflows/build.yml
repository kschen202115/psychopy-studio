name: Build PsychoPy Studio 

on:
  # manual
  workflow_dispatch:  
    inputs:
      branch:
        description: 'PsychoPy Studio branch to build'
        required: true
        type: choice
        options:
          - dev
          - release
      dogfood:
        description: 'Building a dogfood intaller to test?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build PsychoPy Studio
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    defaults:
      run:
        shell: bash
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: |
          npm i
      
      - name: Calculate dogfood version number
        id: dogfood
        run: |
          version=$(npm pkg get "version"| tr -d '"')
          if [ $(git tag -l) ]; then
            last=$(git describe --tags --abbrev=0)
            dogfood=$(git rev-list ${last}..HEAD --count --branches ${{ github.event.inputs.branch }} --tags *)
            echo "${last} is ${dogfood} commits behind HEAD"
          else
            dogfood=$(git rev-list HEAD --count --branches ${{ github.event.inputs.branch }})
            echo "Repo has ${dogfood} commits"
          fi
          echo "version=${version}${{ github.event.inputs.branch }}${dogfood}" >> $GITHUB_OUTPUT
      
      - name: Modify version
        if: ${{ github.event.inputs.dogfood }}
        run: |
          npm pkg set "version"="${{ steps.dogfood.outputs.version }}"
          echo $(npm pkg get "version")
      
      - name: Build installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: |
          npm run build
      
      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ runner.os }}_installer"
          path: 'out/PsychoPy_Studio_*.*'
          retention-days: 30





